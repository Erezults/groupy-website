<!DOCTYPE html>
<html lang="en" dir="ltr" class="no-js">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Groupy — Join a group / הצטרפות לקבוצה</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#0c0e1a" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" href="/assets/img/favicon.png" />
  <link rel="apple-touch-icon" href="/assets/img/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/styles.css" />
  <style>
    body { min-height: 100dvh; display: grid; place-items: center;
      background: radial-gradient(120% 120% at 80% -10%, #1b1f4a 0%, var(--ink, #0c0e1a) 60%); color: var(--text-on-dark, #f4f5fb); }
    .join-card { max-width: 460px; margin-inline: auto; text-align: center; padding: 40px 26px 48px; }
    .join-card .mark { height: 52px; width: auto; margin: 0 auto 26px; filter: drop-shadow(0 8px 30px rgba(0,0,0,.4)); }
    .join-card h1 { font-size: clamp(1.6rem, 5vw, 2.1rem); margin-bottom: 10px; color: #fff; }
    .join-card p { color: var(--text-on-dark-muted, rgba(244,245,251,.72)); font-size: 1.05rem; margin-bottom: 8px; }
    .group-name { color: var(--brand-green, #3ddc84); font-weight: 800; }
    .code-box { display: flex; justify-content: center; gap: 8px; margin: 22px 0 6px; direction: ltr; }
    .code-char { background: rgba(255,255,255,.07); border: 1px solid var(--border-dark, rgba(255,255,255,.14));
      border-radius: 12px; min-width: 42px; padding: 13px 6px; font-weight: 800; font-size: 22px; color: #fff; }
    .copy-btn { background: none; border: none; color: rgba(244,245,251,.5); font-size: .85rem; cursor: pointer; margin-bottom: 22px; font-family: inherit; }
    .copy-btn:hover { color: #fff; }
    .join-actions { display: flex; flex-direction: column; gap: 14px; align-items: center; }
    .join-actions .btn { min-width: 250px; }
    .appstore-badge img { height: 50px; }
    .hint { font-size: .9rem; color: rgba(244,245,251,.55); margin-top: 6px; }
    .lang-switch { position: fixed; top: 16px; inset-inline-end: 16px; }
    .lang-switch button { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2); color: #fff;
      border-radius: 999px; padding: 7px 14px; font-weight: 700; font-size: .85rem; cursor: pointer; }
  </style>
</head>
<body>
  <a class="skip-link" href="#main-content" data-i18n="skip">Skip to content</a>
  <div class="lang-switch"><button id="langBtn" type="button">🇮🇱 עברית</button></div>
  <main class="join-card" id="main-content" tabindex="-1">
    <img class="mark" src="/assets/img/groupy-wordmark.png" alt="Groupy" />
    <div style="font-size:44px;margin-bottom:14px">👨‍👩‍👧‍👦</div>
    <h1 data-i18n="title">You're invited!</h1>
    <p><span data-i18n="sub">Join</span> <span class="group-name" id="groupName"></span> <span data-i18n="sub2">on Groupy — the shared calendar for groups, family & friends.</span></p>
    <div class="code-box" id="codeBox"></div>
    <button class="copy-btn" id="copyBtn" type="button" data-i18n="copy">Copy code</button>
    <div class="join-actions">
      <a class="btn btn-primary" id="openApp" href="groupy://" data-i18n="open">Open Groupy & join</a>
      <a class="appstore-badge" href="https://apps.apple.com/app/id6779937306" target="_blank" rel="noopener" aria-label="App Store">
        <img src="/assets/img/appstore-badge-en.svg" id="badgeImg" alt="App Store" width="180" height="54" />
      </a>
      <p class="hint" data-i18n="hint">No app yet? Download Groupy, then tap the button above — or enter the code on the join screen.</p>
    </div>
  </main>

  <script>
  (function () {
    document.documentElement.classList.remove('no-js');
    var qp = new URLSearchParams(location.search);
    var code = (qp.get('code') || '').replace(/[^A-Za-z0-9]/g, '').toUpperCase().slice(0, 8);
    var group = (qp.get('group') || '').slice(0, 60);
    // Open the SAME app the invite came from (dev builds pass ?app=dev) —
    // mirrors the /auth page's dev/prod mechanism.
    var scheme = qp.get('app') === 'dev' ? 'groupy-dev://' : 'groupy://';

    document.getElementById('groupName').textContent = group ? '"' + group + '"' : '';
    var box = document.getElementById('codeBox');
    (code || '——————').split('').forEach(function (ch) {
      var d = document.createElement('div');
      d.className = 'code-char'; d.textContent = ch;
      box.appendChild(d);
    });
    document.getElementById('openApp').setAttribute('href', scheme + 'join/' + encodeURIComponent(code));

    var STR = {
      en: {
        title: "You're invited!", sub: 'Join', sub2: 'on Groupy — the shared calendar for groups, family & friends.',
        copy: 'Copy code', copied: 'Copied ✓', open: 'Open Groupy & join',
        hint: 'No app yet? Download Groupy, then tap the button above — or enter the code on the join screen.',
        skip: 'Skip to content',
        lang: '🇮🇱 עברית', dir: 'ltr', l: 'en', badge: '/assets/img/appstore-badge-en.svg'
      },
      he: {
        title: 'הוזמנת להצטרף!', sub: 'הצטרפו אל', sub2: 'ב-Groupy — היומן המשותף לקבוצות, למשפחה ולחברים.',
        copy: 'העתקת קוד', copied: 'הועתק ✓', open: 'פתחו את Groupy והצטרפו',
        hint: 'עדיין אין אפליקציה? הורידו את Groupy ולחצו על הכפתור למעלה — או הזינו את הקוד במסך ההצטרפות.',
        skip: 'דלגו לתוכן',
        lang: '🇺🇸 English', dir: 'rtl', l: 'he', badge: '/assets/img/appstore-badge-he.svg'
      }
    };
    function apply(lang) {
      var d = STR[lang];
      document.documentElement.lang = d.l;
      document.documentElement.dir = d.dir;
      document.querySelectorAll('[data-i18n]').forEach(function (el) {
        var k = el.getAttribute('data-i18n'); if (d[k]) el.textContent = d[k];
      });
      document.getElementById('badgeImg').src = d.badge;
      document.getElementById('langBtn').textContent = d.lang;
      try { localStorage.setItem('groupy-join-lang', lang); } catch (e) {}
    }
    var saved = null; try { saved = localStorage.getItem('groupy-join-lang'); } catch (e) {}
    // English default; Hebrew locales auto-detect (same policy as /auth).
    var initial = saved || ((navigator.language || 'en').toLowerCase().indexOf('he') === 0 ? 'he' : 'en');
    apply(initial);
    document.getElementById('langBtn').addEventListener('click', function () {
      apply(document.documentElement.lang === 'he' ? 'en' : 'he');
    });
    document.getElementById('copyBtn').addEventListener('click', function () {
      var d = STR[document.documentElement.lang === 'he' ? 'he' : 'en'];
      navigator.clipboard && navigator.clipboard.writeText(code).then(function () {
        document.getElementById('copyBtn').textContent = d.copied;
      });
    });
  })();
  </script>
  <script src="/assets/js/accessibility.js" defer></script>
</body>
</html>
