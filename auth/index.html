<!DOCTYPE html>
<html lang="he" dir="rtl" class="no-js">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Groupy — אימות אימייל / Email verified</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#0c0e1a" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" href="/assets/img/favicon.png" />
  <link rel="apple-touch-icon" href="/assets/img/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/styles.css" />
  <style>
    body { min-height: 100dvh; display: grid; place-items: center;
      background: radial-gradient(120% 120% at 80% -10%, #1b1f4a 0%, var(--ink) 60%); color: var(--text-on-dark); }
    .auth-card { max-width: 480px; margin-inline: auto; text-align: center; padding: 40px 26px 48px; }
    .auth-card .mark { height: 52px; width: auto; margin: 0 auto 30px; filter: drop-shadow(0 8px 30px rgba(0,0,0,.4)); }
    .badge-ic { width: 88px; height: 88px; border-radius: 50%; margin: 0 auto 24px; display: grid; place-items: center;
      background: rgba(61,220,132,.16); }
    .badge-ic.err { background: rgba(255,61,119,.16); }
    .badge-ic svg { width: 48px; height: 48px; color: var(--brand-green); }
    .badge-ic.err svg { color: var(--brand-pink); }
    .auth-card h1 { font-size: clamp(1.7rem, 5vw, 2.3rem); margin-bottom: 12px; color: #fff; }
    .auth-card p { color: var(--text-on-dark-muted); font-size: 1.08rem; margin-bottom: 30px; }
    .auth-actions { display: flex; flex-direction: column; gap: 14px; align-items: center; }
    .auth-actions .btn { min-width: 240px; }
    .appstore-badge svg, .appstore-badge img { height: 50px; }
    .lang-switch { position: fixed; top: 16px; inset-inline-end: 16px; }
    .lang-switch button { background: rgba(255,255,255,.1); border: 1px solid var(--border-dark); color: #fff;
      border-radius: 999px; padding: 7px 14px; font-weight: 700; font-size: .85rem; }
    .hint { font-size: .9rem; color: var(--text-on-dark-muted); margin-top: 8px; }
  </style>
</head>
<body>
  <div class="lang-switch"><button id="langBtn" type="button">English</button></div>
  <main class="auth-card">
    <img class="mark" src="/assets/img/groupy-wordmark.png" alt="Groupy" />

    <div id="state-ok">
      <div class="badge-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 13l4 4L19 7"/></svg></div>
      <h1 data-i18n="ok_title">האימייל שלך אומת! 🎉</h1>
      <p data-i18n="ok_sub">החשבון שלך מוכן. חזרו לאפליקציית Groupy והתחברו עם האימייל והסיסמה שלכם.</p>
      <div class="auth-actions">
        <a class="btn btn-primary" id="openApp" href="groupy://" data-i18n="open_app">פתחו את Groupy</a>
        <a class="appstore-badge" id="storeBadge" href="https://apps.apple.com/app/id6779937306" target="_blank" rel="noopener" aria-label="App Store">
          <img src="/assets/img/appstore-badge-he.svg" alt="App Store" width="180" height="54" />
        </a>
        <p class="hint" data-i18n="hint">לא נפתח? ודאו ש-Groupy מותקנת, ופתחו אותה ידנית.</p>
      </div>
    </div>

    <div id="state-err" style="display:none">
      <div class="badge-ic err"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg></div>
      <h1 data-i18n="err_title">הקישור פג או אינו תקין</h1>
      <p data-i18n="err_sub">קישור האימות פג תוקף או כבר נוצל. פתחו את Groupy ובקשו אימייל אימות חדש.</p>
      <div class="auth-actions">
        <a class="btn btn-primary" href="groupy://" data-i18n="open_app2">פתחו את Groupy</a>
        <a class="appstore-badge" href="https://apps.apple.com/app/id6779937306" target="_blank" rel="noopener" aria-label="App Store">
          <img src="/assets/img/appstore-badge-he.svg" alt="App Store" width="180" height="54" />
        </a>
      </div>
    </div>
  </main>

  <script>
  (function () {
    document.documentElement.classList.remove('no-js');
    var STR = {
      he: {
        ok_title: 'האימייל שלך אומת! 🎉',
        ok_sub: 'החשבון שלך מוכן. חזרו לאפליקציית Groupy והתחברו עם האימייל והסיסמה שלכם.',
        open_app: 'פתחו את Groupy', open_app2: 'פתחו את Groupy',
        hint: 'לא נפתח? ודאו ש-Groupy מותקנת, ופתחו אותה ידנית.',
        err_title: 'הקישור פג או אינו תקין',
        err_sub: 'קישור האימות פג תוקף או כבר נוצל. פתחו את Groupy ובקשו אימייל אימות חדש.',
        lang: 'English', badge: '/assets/img/appstore-badge-he.svg'
      },
      en: {
        ok_title: 'Your email is verified! 🎉',
        ok_sub: 'Your account is ready. Head back to the Groupy app and sign in with your email and password.',
        open_app: 'Open Groupy', open_app2: 'Open Groupy',
        hint: "Didn't open? Make sure Groupy is installed, then open it manually.",
        err_title: 'This link has expired or is invalid',
        err_sub: 'The verification link expired or was already used. Open Groupy and request a new confirmation email.',
        lang: 'עברית', badge: '/assets/img/appstore-badge-en.svg'
      }
    };
    // Detect error in URL (GoTrue puts errors in query or hash)
    var h = (location.hash || '').replace('#','') + '&' + (location.search || '').replace('?','');
    var isErr = /error=|error_description=|otp_expired|access_denied/i.test(h);
    document.getElementById('state-ok').style.display = isErr ? 'none' : '';
    document.getElementById('state-err').style.display = isErr ? '' : 'none';

    function apply(lang) {
      var d = STR[lang];
      document.documentElement.lang = lang;
      document.documentElement.dir = (lang === 'he') ? 'rtl' : 'ltr';
      document.querySelectorAll('[data-i18n]').forEach(function (el) {
        var k = el.getAttribute('data-i18n'); if (d[k]) el.textContent = d[k];
      });
      document.querySelectorAll('.appstore-badge img').forEach(function (img) { img.src = d.badge; });
      document.getElementById('langBtn').textContent = d.lang;
      try { localStorage.setItem('groupy-auth-lang', lang); } catch (e) {}
    }
    var saved = null; try { saved = localStorage.getItem('groupy-auth-lang'); } catch (e) {}
    var initial = saved || ((navigator.language || 'he').toLowerCase().indexOf('he') === 0 ? 'he' : 'en');
    apply(initial);
    document.getElementById('langBtn').addEventListener('click', function () {
      apply(document.documentElement.lang === 'he' ? 'en' : 'he');
    });
  })();
  </script>
</body>
</html>
